version: "3.8"

services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./.env:/app/.env
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Berlin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: trading-dashboard
    restart: unless-stopped
    env_file: .env
    command: >
      python -m streamlit run dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --server.enableWebsocketCompression=false
      --server.enableCORS=false
      --server.enableXsrfProtection=false
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Berlin
      - DATA_DIR=/app/data
      - BOT_API_URL=http://trading-bot:8502
    depends_on:
      - trading-bot
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
