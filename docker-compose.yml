version: "3.8"

services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./static:/app/static
      - ./.env:/app/.env
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Berlin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
